<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TherapAI Meet Launcher — Settings</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 520px; margin: 30px auto; padding: 0 24px; color: #111; }
    h2 { font-size: 18px; margin-bottom: 4px; }
    .sub { color: #666; font-size: 13px; margin-bottom: 24px; }
    label { display: block; margin: 16px 0 6px; font-weight: 600; font-size: 13px; }
    input { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    input:focus { outline: none; border-color: #3b82f6; }
    .hint { color: #666; font-size: 12px; margin: 4px 0 0; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 24px; font-weight: 500; }
    button:hover { background: #2563eb; }
    .saved { color: #0a7d34; margin-left: 12px; font-size: 13px; }
    code { background: #f0f0f0; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
  <h2>TherapAI Meet Launcher</h2>
  <p class="sub">Settings sync across browsers signed in to the same Chrome profile.</p>

  <label for="apiBase">TherapAI API base URL</label>
  <input id="apiBase" type="url" placeholder="https://therapai-one.vercel.app">
  <p class="hint">Default is the current production URL. Change to <code>https://therapai.app</code> once the custom domain ships.</p>

  <button id="save">Save</button>
  <span id="saved" class="saved"></span>

  <script src="options.js"></script>
</body>
</html>
